<html lang="en">
<head>
<title>Tic Tac Toe</title>

<style>

body{
    font-family: Arial;
    text-align: center;
}

#board{
    width:270px;
    margin:auto;
}

.cell{
    width:90px;
    height:90px;
    border:4px double black;
    float:left;
    font-size:40px;
    line-height:90px;
    cursor:pointer;
    background-color:rgb(241, 241, 146);
    box-sizing:border-box;
}

.cell:hover{
    background-color:#eed46c;
}

.win{
    background-color:orange;
}

#status{
    margin-top:20px;
    font-size:20px;
}

#score{
    margin-top:10px;
    font-size:18px;
}

#reset{
    margin-top:20px;
    padding:10px 20px;
}

</style>
</head>

<body>

<h1>Tic Tac Toe Game</h1>

<div id="board">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<div style="clear:both"></div>

<p id="status">Current Player : X</p>

<p id="score">
X Wins : <span id="xscore">0</span> |
O Wins : <span id="oscore">0</span>
</p>

<button id="reset">Reset Game</button>

<script src="script.js"></script>

</body>
</html>
