<!DOCTYPE html>
<html>
<head>
    <title>Person Profile</title>
</head>
<body>

    <table border="1" width="600" align="center" cellspacing="0" cellpadding="5">
        <tr>
            <td colspan="3" align="center">
                <h2>PERSON PROFILE</h2>
            </td>
        </tr>

        <tr>
            <td width="20%">Name</td>
            <td width="70%"><input type="text" name="name" style="width: 90%;"></td>
            <td width="10%"></td> </tr>

        <tr>
            <td>Email</td>
            <td><input type="email" name="email" style="width: 90%;"></td>
            <td></td>
        </tr>

        <tr>
            <td>Gender</td>
            <td>
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender" value="Female"> Female
                <input type="radio" name="gender" value="Other"> Other
            </td>
            <td></td>
        </tr>

        <tr>
            <td>Date of Birth</td>
            <td>
                <input type="text" size="4"> /
                <input type="text" size="4"> /
                <input type="text" size="6">
                <i>(dd/mm/yyyy)</i>
            </td>
            <td></td>
        </tr>

        <tr>
            <td>Blood Group</td>
            <td>
                <select name="bloodgroup">
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </td>
            <td></td>
        </tr>

        <tr>
            <td>Degree</td>
            <td>
                <input type="checkbox" name="degree" value="SSC"> SSC
                <input type="checkbox" name="degree" value="HSC"> HSC
                <input type="checkbox" name="degree" value="BSc"> BSc.
                <input type="checkbox" name="degree" value="MSc"> MSc.
            </td>
            <td></td>
        </tr>

        <tr>
            <td>Photo</td>
            <td>
                <input type="file" name="photo">
            </td>
            <td></td>
        </tr>

        <tr>
            <td colspan="3" align="right" height="50">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </td>
        </tr>

    </table>

</body>
</html>
