<!DOCTYPE html>
<html>
<head>
<title>Email Validation</title>

<style>
.info {
  display: inline-block;
  width: 18px;
  height: 18px;
  background-color: rgb(50, 138, 226);
  color: white;
  text-align: center;
  line-height: 18px;
  cursor: pointer;
  font-weight: bold;
}

#hintBox {
  border: 1px solid black;
  padding: 4px;
  display: none;
  margin-top: 5px;
  width: 200px;
}
</style>

</head>
<body>

<h3>Email</h3>

<input type="text" id="email">
<span class="info" onclick="showHint()">i</span>

<br><br>

<input type="button" value="Submit" onclick="validateEmail()">

<p id="E1"></p>

<div id="hintBox">
  hint: sample@example.com
</div>

<script>

function showHint() {

  let box = document.getElementById("hintBox");

  if (box.style.display === "none") {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}


function validateEmail() {

  let email = document.getElementById("email").value.trim();

  // 1. Cannot be empty
  if (email == "") {
    document.getElementById("E1").innerHTML = "Cannot be empty";
    return;
  }

  // 2. Must contain exactly one @
  let parts = email.split("@");

  if (parts.length != 2) {
    document.getElementById("E1").innerHTML = "Invalid Email";
    return;
  }

  let beforeAt = parts[0];
  let afterAt = parts[1];

  // Must have text before and after @
  if (beforeAt == "" || afterAt == "") {
    document.getElementById("E1").innerHTML = "Invalid Email";
    return;
  }

  // After @ must contain at least one dot
  if (!afterAt.includes(".")) {
    document.getElementById("E1").innerHTML = "Invalid Email";
    return;
  }

  // Dot cannot be first or last after @
  if (afterAt.startsWith(".") || afterAt.endsWith(".")) {
    document.getElementById("E1").innerHTML = "Invalid Email";
    return;
  }

  document.getElementById("E1").innerHTML = "Valid Email";
}

</script>

</body>
</html>
