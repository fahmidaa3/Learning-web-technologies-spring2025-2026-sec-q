<!DOCTYPE html>
<html>
<head>
<style>
fieldset {
  width: 300px;
  padding: 15px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<form>

<fieldset>
  <legend>Degree</legend>

  <input type="checkbox" id="ssc"> SSC
  <input type="checkbox" id="hsc"> HSC
  <input type="checkbox" id="bsc"> BSc

</fieldset>

<button type="button" onclick="validateDegree()">Submit</button>

<p id="degreeMsg"></p>

</form>

<script>
function validateDegree() {

  let ssc = document.getElementById("ssc").checked;
  let hsc = document.getElementById("hsc").checked;
  let bsc = document.getElementById("bsc").checked;

  if (ssc === false && hsc === false && bsc === false) {
    document.getElementById("degreeMsg").innerHTML =
    "At least one of them has to be selected";
    return;
  }

  document.getElementById("degreeMsg").innerHTML = "Valid";
}
</script>

</body>
</html>
